[tool.uv.workspace]
members = ["projects/common", "projects/generation", "projects/backfill"]

# The backfill box is CPU-only (see deploy/gmi/README.md); pull the CPU torch
# build so the image doesn't drag in the ~8GB CUDA stack it can never use.
[tool.uv.sources]
torch = { index = "pytorch-cpu" }

[[tool.uv.index]]
name = "pytorch-cpu"
url = "https://download.pytorch.org/whl/cpu"
explicit = true

[dependency-groups]
dev = ["pytest>=8", "pytest-asyncio>=0.24", "httpx>=0.27"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["projects/common/tests", "projects/generation/tests", "projects/backfill/tests"]
