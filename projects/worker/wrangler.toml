name = "wagmiphotos-worker"
main = "src/index.ts"
compatibility_date = "2026-06-01"
# Served exclusively via the custom domains wagmi.photos + api.wagmi.photos.
workers_dev = false
preview_urls = false

# D1 — same database the backfill/seed write (set database_id after `wrangler d1 create`)
[[d1_databases]]
binding = "DB"
database_name = "wagmiphotos"
database_id = "f154509c-622f-451f-a004-70e91a0ed68a"

# Workers AI — BGE text embedding
[ai]
binding = "AI"

# Vectorize — 3-shard BGE index (fan-out query, fnv1a32(id)-routed writes)
[[vectorize]]
binding = "VECTORIZE_0"
index_name = "wagmiphotos-bge-0"

[[vectorize]]
binding = "VECTORIZE_1"
index_name = "wagmiphotos-bge-1"

[[vectorize]]
binding = "VECTORIZE_2"
index_name = "wagmiphotos-bge-2"

# Vectorize — namespaced collections index (namespace = collection id). Dual-
# written alongside the shards for collection assets; scoped queries hit only
# this index. Create with:
#   npx wrangler vectorize create wagmiphotos-coll --dimensions=768 --metric=cosine
[[vectorize]]
binding = "VECTORIZE_COLL"
index_name = "wagmiphotos-coll"

# R2 — originals for BYOK in-request generation. Serve the bucket publicly
# (custom domain or r2.dev) and point BYOK_PUBLIC_URL_BASE at it. The
# demand-first rehost derives thumb/medium/large into B2 later (0008).
[[r2_buckets]]
binding = "BYOK_ORIGINALS"
bucket_name = "wagmiphotos-byok-originals"

# Per-IP rate limit for key generation
[[unsafe.bindings]]
name = "RATE_LIMITER"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 10, period = 60 }

# Higher generation limit for paid (bearer-key) traffic. namespace_id must be
# unique across the account's ratelimit namespaces.
[[unsafe.bindings]]
name = "RATE_LIMITER_PAID"
type = "ratelimit"
namespace_id = "1002"
simple = { limit = 120, period = 60 }

[vars]
# DEV_MODE must NEVER be set in production: it opens the unauthenticated dev API
# lane and console-logs magic links. Set it only in .dev.vars for local dev
# (see .dev.vars.example).
EMAIL_FROM = "noreply@mail.suppers.ai"   # verified Resend sending address (domain: mail.suppers.ai)
# Similarity floors are deliberately NOT set here: numEnv() would give them
# precedence over the contract-pinned defaults in src/floor.ts (that is how the
# 0.87->0.84 lowering silently never went live). contract.test.ts enforces this.
IMAGE_PRICE_USD = "0.055"        # advertised cost_saved_usd per hit — keep in sync with common/config.py image_price_usd
PUBLIC_SITE_URL = "https://wagmi.photos"           # canonical site origin (override per environment / .dev.vars)
PUBLIC_API_BASE_URL = "https://api.wagmi.photos/v1"  # documented API base rendered into docs/examples
GITHUB_REPO = "wagmiphotos/wagmiphotos"            # repo for the header star-count badge
ASSET_BASE_URL = "https://cdn.wagmi.photos"  # CF-proxied B2 via a Transform Rule that prepends /file/wagmi-photos-library (free egress + cache rule); MUST equal backfill B2_PUBLIC_URL_BASE
STRIPE_PRICE_ID = "price_1TsgkV6B7zYoQqixfWCXgoHR"   # recurring annual $24 Price id (sandbox now, live at launch)
BYOK_PUBLIC_URL_BASE = "https://byok.wagmi.photos"  # public origin of the BYOK_ORIGINALS R2 bucket
# Secrets (set with `wrangler secret put`): MASTER_API_KEY, RESEND_API_KEY, STRIPE_SECRET_KEY, STRIPE_WEBHOOK_SECRET, BYOK_KEK, OPENAI_API_KEY

[assets]
directory = "./public"
binding = "ASSETS"
run_worker_first = true
not_found_handling = "single-page-application"

# Cron sweep for async BYOK generation jobs (generation-jobs.ts): every 2 min
# so an abandoned OpenAI background job is still inside its ~10-min retention.
[triggers]
crons = ["*/2 * * * *"]
