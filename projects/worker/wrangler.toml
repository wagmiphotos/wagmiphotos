name = "sharedcache-worker"
main = "src/index.ts"
compatibility_date = "2026-06-01"

# D1 — same database the backfill/seed write (set database_id after `wrangler d1 create`)
[[d1_databases]]
binding = "DB"
database_name = "sharedcache"
database_id = "REPLACE_WITH_D1_DATABASE_ID"

# Workers AI — BGE text embedding
[ai]
binding = "AI"

# Vectorize — BGE index
[[vectorize]]
binding = "VECTORIZE"
index_name = "wagmiphotos-bge"

# Per-IP rate limit for key generation
[[unsafe.bindings]]
name = "RATE_LIMITER"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 10, period = 60 }

[vars]
EMAIL_FROM = "login@wagmi.photos"   # verified Resend sending address
FLOOR_SIM_MAX = "0.90"
FLOOR_SIM_MIN = "0.72"
IMAGE_PRICE_USD = "0.04"
PUBLIC_SITE_URL = "https://wagmi.photos"           # canonical site origin (override per environment / .dev.vars)
PUBLIC_API_BASE_URL = "https://api.wagmi.photos/v1"  # documented API base rendered into docs/examples
GITHUB_REPO = "wagmiphotos/wagmiphotos"            # repo for the header star-count badge
# Secrets (set with `wrangler secret put`): MASTER_API_KEY, RESEND_API_KEY

[assets]
directory = "./public"
binding = "ASSETS"
run_worker_first = true
not_found_handling = "single-page-application"
